<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#f7f3ed"/>
<title>MAISON</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--ink:#1c140a;--cream:#f7f3ed;--bone:#ede4d5;--warm:#c9b89a;--muted:#8a7a68;--red:#a82020;--green:#2a5f3f;--gold:#b8962e;--teal:#2a7070;--section-pad:28px 20px 160px;}
body{font-family:'EB Garamond',serif;background:var(--cream);color:var(--ink);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--warm);border-radius:2px}
input,textarea,select{font-family:'EB Garamond',serif;font-size:16px;background:transparent}
input::placeholder,textarea::placeholder{color:#bbb;font-style:italic}
button{font-family:'Cormorant Garamond',serif;cursor:pointer;touch-action:manipulation}
a{color:var(--ink)}img{display:block;max-width:100%}select{cursor:pointer}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");opacity:.35;}

/* AUTH */
#auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--cream);position:relative;overflow:hidden}
#auth-screen::before,#auth-screen::after{content:'';position:absolute;left:0;right:0;height:4px;background:repeating-linear-gradient(90deg,var(--ink) 0,var(--ink) 35px,transparent 35px,transparent 70px)}
#auth-screen::before{top:0}#auth-screen::after{bottom:0}
.auth-deco{position:absolute;font-family:'Cormorant Garamond',serif;font-size:220px;font-weight:700;color:var(--bone);letter-spacing:-.04em;pointer-events:none;user-select:none;top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap}
.auth-box{max-width:380px;width:100%;position:relative;z-index:1}
.masthead{text-align:center;margin-bottom:48px}
.masthead-sub{font-size:10px;letter-spacing:.5em;text-transform:uppercase;color:var(--warm);font-family:'Cormorant Garamond',serif;margin-bottom:14px}
.masthead-title{font-family:'Cormorant Garamond',serif;font-size:80px;font-weight:700;color:var(--ink);line-height:.85;letter-spacing:-.02em}
.masthead-rule{width:48px;height:1px;background:var(--warm);margin:22px auto 12px}
.masthead-tagline{font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:var(--muted);font-family:'Cormorant Garamond',serif}
.auth-note{text-align:center;font-size:12px;color:var(--muted);margin-top:18px;font-style:italic;line-height:1.6}
.err-msg{color:var(--red);font-size:13px;margin-bottom:12px;font-style:italic}

/* SIDE PANEL */
#panel-overlay{position:fixed;inset:0;background:rgba(28,20,10,.45);z-index:400;display:none;backdrop-filter:blur(4px)}
#panel-overlay.open{display:block}
#side-panel{position:fixed;top:0;left:0;bottom:0;width:300px;max-width:90vw;background:var(--cream);z-index:401;transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column;border-right:1px solid var(--bone)}
#side-panel.open{transform:translateX(0)}
.panel-head{padding:20px 18px 14px;border-bottom:3px solid var(--ink);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--cream);z-index:1}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;letter-spacing:-.01em;text-transform:uppercase}
.panel-close{background:none;border:none;font-size:22px;color:var(--muted);font-family:serif}
.panel-filter-row{display:flex;gap:5px;padding:10px 14px;border-bottom:1px solid var(--bone);flex-wrap:wrap}
.panel-filter{background:none;border:1px solid rgba(28,20,10,.18);color:var(--muted);font-family:'Cormorant Garamond',serif;font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;transition:all .2s}
.panel-filter.active{background:var(--ink);border-color:var(--ink);color:var(--cream)}
.panel-filter.arch-filter.active{background:var(--muted);border-color:var(--muted)}
.panel-body{padding:14px 18px 80px;flex:1}
.panel-section-label{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-family:'Cormorant Garamond',serif;margin:16px 0 8px;font-weight:600}
.panel-section-label:first-child{margin-top:0}
.panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.panel-photo{position:relative;overflow:hidden;border:1px solid var(--bone);background:var(--bone);aspect-ratio:1;cursor:pointer;transition:box-shadow .2s}
.panel-photo:hover{box-shadow:0 3px 14px rgba(28,20,10,.14)}
.panel-photo img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.panel-photo:hover img{transform:scale(1.05)}
.panel-photo-liked{position:absolute;top:5px;left:5px;width:6px;height:6px;border-radius:50%;background:var(--red)}
.panel-photo-like{position:absolute;top:5px;right:5px;background:rgba(247,243,237,.88);border:none;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;opacity:0;transition:opacity .2s;color:var(--muted)}
.panel-photo:hover .panel-photo-like,.panel-photo-like.on{opacity:1}
.panel-photo-like.on{color:var(--red)}
.panel-photo-move{position:absolute;bottom:5px;right:5px;background:rgba(247,243,237,.9);border:none;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;opacity:0;transition:opacity .2s;cursor:pointer;color:var(--ink)}
.panel-photo:hover .panel-photo-move{opacity:1}
.panel-photo-dest{position:absolute;bottom:0;left:0;right:0;background:rgba(28,20,10,.6);color:var(--cream);font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-family:'Cormorant Garamond',serif;padding:4px 6px;transform:translateY(100%);transition:transform .2s}
.panel-photo:hover .panel-photo-dest{transform:translateY(0)}
.panel-photo-arch-actions{position:absolute;top:5px;right:5px;display:flex;flex-direction:column;gap:3px}
.arch-btn{border:none;color:white;padding:3px 6px;font-size:10px;cursor:pointer;font-family:'Cormorant Garamond',serif}
.panel-pinned-label{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--red);font-family:'Cormorant Garamond',serif;margin:0 0 8px;font-weight:600}
.panel-empty{font-size:13px;color:var(--muted);font-style:italic;text-align:center;padding:32px 0}

/* APP */
#app{display:none;min-height:100vh;flex-direction:column}
#app.visible{display:flex}
header{position:sticky;top:0;z-index:200;background:rgba(247,243,237,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--bone)}
.header-stripe{height:3px;background:repeating-linear-gradient(90deg,var(--ink) 0,var(--ink) 30px,transparent 30px,transparent 60px)}
.header-inner{max-width:980px;margin:0 auto;padding:0 20px}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:12px 0 8px}
.header-brand{text-align:center}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:700;letter-spacing:-.025em;color:var(--ink);line-height:1}
.brand-sub{font-size:8px;letter-spacing:.55em;text-transform:uppercase;color:var(--warm);font-family:'Cormorant Garamond',serif}
.header-btn{background:none;border:none;color:var(--muted);display:flex;align-items:center;gap:5px;font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;transition:color .2s;position:relative}
.header-btn:hover{color:var(--ink)}
.panel-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;width:14px;height:14px;border-radius:50%;font-size:8px;display:none;align-items:center;justify-content:center;font-family:sans-serif}
.panel-badge.show{display:flex}
nav{display:flex;justify-content:center;border-top:1px solid var(--bone);overflow-x:auto;gap:0;-webkit-overflow-scrolling:touch}
.nav-btn{background:none;border:none;border-bottom:2px solid transparent;padding:11px 16px;font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:-1px;white-space:nowrap;transition:color .2s}
.nav-btn.active{border-bottom-color:var(--ink);color:var(--ink)}
main{max-width:980px;margin:0 auto;padding:var(--section-pad);width:100%;flex:1}

/* CAMERA DOCK */
#camera-dock{position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(247,243,237,.96);backdrop-filter:blur(16px);border-top:1px solid var(--bone);display:flex;justify-content:center;padding:14px 0 calc(20px + env(safe-area-inset-bottom));gap:18px}
.cam-wrap{display:flex;flex-direction:column;align-items:center;gap:5px}
.cam-btn{width:54px;height:54px;border-radius:50%;background:var(--ink);border:3px solid var(--cream);outline:1px solid var(--ink);display:flex;align-items:center;justify-content:center;color:var(--cream);box-shadow:0 4px 20px rgba(28,20,10,.22);transition:transform .2s,box-shadow .2s;touch-action:manipulation}
.cam-btn:active{transform:scale(.96)}
.cam-btn:hover{transform:scale(1.07)}
.cam-btn.mood{background:var(--gold)}
.cam-btn.photos{background:var(--green)}
.cam-label{font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);font-family:'Cormorant Garamond',serif}
#file-input,#file-input-camera,#fp-file-input,#rm-tile-input{display:none}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(28,20,10,.52);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:var(--cream);max-width:540px;width:100%;max-height:92vh;overflow-y:auto;padding:32px 36px;animation:modalIn .22s ease;border-top:3px solid var(--ink)}
@keyframes modalIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;letter-spacing:.08em;color:var(--ink);text-transform:uppercase}
.modal-close{background:none;border:none;color:var(--muted);font-size:24px;line-height:1;margin-left:16px;padding:0;font-family:serif}
.modal-close:hover{color:var(--ink)}
.modal-preview{width:100%;max-height:240px;object-fit:cover;margin-bottom:16px;border:1px solid var(--bone)}
.modal-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}

/* SECTION */
.section-rule{border-top:3px solid var(--ink);padding-top:18px;margin-bottom:26px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px}
.section-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:-.01em}
.section-sub{font-family:'EB Garamond',serif;font-size:13px;color:var(--muted);font-style:italic;margin-top:4px}
.room-tabs-row{display:flex;border-bottom:1px solid var(--bone);margin-bottom:22px;overflow-x:auto;gap:0;-webkit-overflow-scrolling:touch}
.room-tab{background:none;border:none;border-bottom:2px solid transparent;padding:10px 16px;font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);white-space:nowrap;margin-bottom:-1px;transition:color .2s;position:relative}
.room-tab.active{border-bottom-color:var(--ink);color:var(--ink)}
.room-tab.drag-over{border-bottom-color:var(--gold)!important;color:var(--gold)!important}
.room-tab[draggable="true"]{cursor:grab;user-select:none}
.drag-handle{font-size:9px;color:var(--warm);margin-right:4px;letter-spacing:-.1em}

/* HOME VIEW & ROOM SUB-TABS */
.home-view-tabs{display:flex;border-bottom:1px solid var(--bone);margin-bottom:22px}
.home-view-tab{background:none;border:none;border-bottom:2px solid transparent;padding:10px 22px;font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:-1px;transition:color .2s}
.home-view-tab.active{border-bottom-color:var(--ink);color:var(--ink)}
.room-sub-tabs{display:flex;border-bottom:1px solid var(--bone);margin-bottom:20px}
.room-sub-tab{background:none;border:none;border-bottom:2px solid transparent;padding:9px 16px;font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:-1px;transition:color .2s}
.room-sub-tab.active{border-bottom-color:var(--gold);color:var(--ink)}

/* FLOOR PLAN */
.fp-container{position:relative;width:100%;cursor:crosshair;user-select:none;border:1px solid var(--bone);overflow:hidden;background:var(--bone)}
.fp-img{width:100%;display:block;pointer-events:none}
.fp-marker{position:absolute;width:30px;height:30px;border-radius:50%;background:var(--ink);border:2px solid var(--cream);box-shadow:0 2px 10px rgba(28,20,10,.35);transform:translate(-50%,-50%);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--cream);font-family:'Cormorant Garamond',serif;font-size:12px;font-weight:700;transition:transform .2s,background .2s;z-index:5}
.fp-marker:hover{transform:translate(-50%,-50%) scale(1.2);background:var(--gold)}
.fp-label{position:absolute;top:calc(100% + 5px);left:50%;transform:translateX(-50%);background:var(--ink);color:var(--cream);font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-family:'Cormorant Garamond',serif;padding:3px 8px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s}
.fp-marker:hover .fp-label{opacity:1}
.fp-del{position:absolute;top:-5px;right:-5px;width:15px;height:15px;border-radius:50%;background:var(--red);border:none;color:white;font-size:9px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;cursor:pointer}
.fp-marker:hover .fp-del{opacity:1}

/* MOOD BOARD SWATCHES */
.mb-swatch-wrap{position:relative;display:inline-flex;flex-direction:column;align-items:center}
.mb-swatch{width:52px;height:52px;border:1px solid rgba(28,20,10,.1);cursor:pointer;transition:transform .2s}
.mb-swatch:hover{transform:scale(1.06)}
.mb-swatch-del{position:absolute;top:-5px;right:-5px;background:var(--red);border:none;color:white;width:15px;height:15px;border-radius:50%;font-size:9px;cursor:pointer;opacity:0;transition:opacity .2s;display:flex;align-items:center;justify-content:center}
.mb-swatch-wrap:hover .mb-swatch-del{opacity:1}
.mb-swatch-label{font-size:9px;color:var(--muted);text-align:center;margin-top:3px;font-family:'Cormorant Garamond',serif;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.color-picker-input{width:100%;height:48px;border:1px solid var(--bone);cursor:pointer;margin-bottom:14px;padding:2px}
.ral-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px}
.ral-preview-box{width:44px;height:44px;border:1px solid var(--bone);flex-shrink:0;transition:background .2s}

/* BUDGET */
.budget-block{background:var(--bone);padding:18px 22px;margin-bottom:22px;border-left:3px solid var(--ink)}
.budget-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.budget-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-family:'Cormorant Garamond',serif;font-weight:600}
.budget-amount{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--ink)}
.budget-amount.over{color:var(--red)}
.bar-track{height:2px;background:rgba(28,20,10,.12);margin-bottom:6px}
.bar-fill{height:100%;background:var(--ink);transition:width .6s}
.bar-fill.over{background:var(--red)}
.bar-note{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.bar-note.over{color:var(--red)}

/* PHOTO GRID */
.photo-grid{columns:2 180px;gap:12px;margin-top:16px}
.photo-card{break-inside:avoid;margin-bottom:12px;position:relative;overflow:hidden;background:var(--bone);border:1px solid var(--bone);transition:box-shadow .2s}
.photo-card:hover{box-shadow:0 4px 20px rgba(28,20,10,.12)}
.photo-card img{width:100%;display:block;transition:transform .5s;cursor:pointer}
.photo-card:hover img{transform:scale(1.04)}
.photo-card-actions{position:absolute;top:7px;right:7px;display:flex;flex-direction:column;gap:4px;opacity:0;transition:opacity .2s}
.photo-card:hover .photo-card-actions{opacity:1}
.img-btn{width:26px;height:26px;border:none;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:all .2s;cursor:pointer}
.img-btn.default{background:rgba(247,243,237,.9);color:var(--muted)}
.img-btn.liked{background:rgba(168,32,32,.88);color:var(--cream)}
.img-btn.del{background:rgba(168,32,32,.88);color:var(--cream)}
.img-btn.arch{background:rgba(247,243,237,.88);color:var(--muted)}
.img-btn.arch:hover{background:rgba(28,20,10,.7);color:var(--cream)}
.photo-note{padding:10px 12px 12px;font-size:13px;color:var(--ink);line-height:1.55;background:var(--cream);border-top:1px solid var(--bone)}
.photo-link{display:block;padding:6px 12px;font-size:11px;color:var(--muted);font-family:'Cormorant Garamond',serif;letter-spacing:.1em;background:var(--bone);border-top:1px solid rgba(28,20,10,.07);text-decoration:none;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.photo-link:hover{color:var(--ink)}
.photo-price{padding:4px 12px 10px;font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--green)}
.liked-dot{position:absolute;top:7px;left:7px;width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 0 2px rgba(247,243,237,.8)}

/* ITEMS */
.item-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--bone)}
.item-thumb{width:52px;height:52px;object-fit:cover;flex-shrink:0;border:1px solid var(--bone)}
.item-thumb-ph{width:52px;height:52px;background:var(--bone);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--warm);font-size:22px}
.item-body{flex:1;min-width:0}
.item-name{font-size:15px;color:var(--ink);margin-bottom:2px}
.item-store{font-size:10px;color:var(--muted);font-family:'Cormorant Garamond',serif;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.item-link{font-size:11px;color:var(--muted);text-decoration:underline;word-break:break-all}
.item-link:hover{color:var(--ink)}
.item-price{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--ink);flex-shrink:0;white-space:nowrap}
.icon-btn{background:none;border:none;color:var(--muted);padding:3px;display:flex;transition:color .2s}
.icon-btn:hover{color:var(--red)}
.cat-badge{font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-family:'Cormorant Garamond',serif;padding:2px 7px;border:1px solid var(--bone);color:var(--muted);margin-bottom:3px;display:inline-block}

/* MOOD BOARD */
.mood-board{min-height:300px;background:var(--bone);padding:20px;display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;border:2px dashed var(--warm)}
.mood-board.empty-board{align-items:center;justify-content:center}
.mood-tile{position:relative;overflow:hidden;border:1px solid var(--bone)}
.mood-tile img{display:block;width:100%;height:100%;object-fit:cover}
.mood-tile.size-sm{width:130px;height:130px}
.mood-tile.size-md{width:200px;height:150px}
.mood-tile.size-lg{width:280px;height:200px}
.mood-tile .tile-note{position:absolute;bottom:0;left:0;right:0;background:rgba(28,20,10,.6);color:var(--cream);font-size:11px;padding:5px 7px;transform:translateY(100%);transition:transform .2s}
.mood-tile:hover .tile-note{transform:translateY(0)}
.mood-palette{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.palette-swatch{width:32px;height:32px;border:2px solid transparent;transition:border-color .2s}
.palette-swatch:hover{border-color:var(--ink)}

/* RECIPES */
.recipe-grid{columns:2 240px;gap:14px;margin-top:16px}
.recipe-card{break-inside:avoid;margin-bottom:14px;background:var(--cream);border:1px solid var(--bone);overflow:hidden}
.recipe-img{width:100%;max-height:200px;object-fit:cover;display:block;cursor:pointer}
.recipe-body{padding:14px 16px 16px}
.recipe-tag{display:inline-block;font-size:9px;letter-spacing:.18em;text-transform:uppercase;border:1px solid var(--bone);padding:2px 8px;margin-right:5px;margin-bottom:8px;color:var(--muted);font-family:'Cormorant Garamond',serif}
.recipe-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--ink);margin-bottom:6px}
.recipe-text{font-size:13px;color:var(--muted);line-height:1.6;white-space:pre-wrap}

/* MUSIC */
.song-row{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--bone)}
.song-num{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--warm);min-width:26px;text-align:right;flex-shrink:0;padding-top:2px}
.song-body{flex:1;min-width:0}
.song-title{font-size:15px;color:var(--ink);margin-bottom:2px}
.song-artist{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-family:'Cormorant Garamond',serif}
.song-note{font-size:12px;color:var(--muted);font-style:italic;margin-top:3px}
.song-link-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:1px solid var(--bone);color:var(--muted);font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:5px 10px;text-decoration:none;transition:all .2s;flex-shrink:0;align-self:center;white-space:nowrap}
.song-link-btn:hover{background:var(--ink);color:var(--cream);border-color:var(--ink)}

/* PANEL TABS */
.panel-mode-tabs{display:flex;border-bottom:1px solid var(--bone)}
.panel-mode-tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;padding:10px 0;font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:-1px;transition:all .2s;cursor:pointer}
.panel-mode-tab.active{border-bottom-color:var(--ink);color:var(--ink)}

/* LINK ITEMS */
.link-item{padding:12px 0;border-bottom:1px solid var(--bone);display:flex;align-items:flex-start;gap:10px}
.link-item-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.link-item-body{flex:1;min-width:0}
.link-item-title{font-size:14px;color:var(--ink);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.link-item-url{font-size:11px;color:var(--muted);text-decoration:none;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.link-item-url:hover{color:var(--ink)}
.link-item-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--warm);font-family:'Cormorant Garamond',serif;margin-top:3px}

/* NOTES BUTTON */
.notes-btn{background:none;border:1px solid var(--bone);color:var(--muted);font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:5px 11px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px;vertical-align:middle}
.notes-btn:hover,.notes-btn.has-notes{border-color:var(--gold);color:var(--gold)}
.photo-card.pressing img{transform:scale(.97);opacity:.75;transition:none}

/* UTILS */
.field-label{display:block;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-weight:600}
.field-input{width:100%;border:none;border-bottom:1px solid var(--warm);padding:9px 2px;color:var(--ink);font-size:15px;outline:none;margin-bottom:18px;border-radius:0;transition:border-color .2s}
.field-input:focus{border-bottom-color:var(--ink)}
textarea.field-input{resize:vertical;min-height:80px;border:1px solid var(--warm);padding:9px}
select.field-input{appearance:none}
.btn-solid{background:var(--ink);border:none;color:var(--cream);font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.14em;text-transform:uppercase;padding:13px 28px;width:100%;transition:opacity .2s}
.btn-solid:hover{opacity:.82}
.btn-solid.sm{padding:9px 20px;width:auto;font-size:12px}
.btn-solid.green{background:var(--green)}
.btn-solid.teal{background:var(--teal)}
.btn-ghost{background:transparent;border:1px solid rgba(28,20,10,.22);color:var(--muted);font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:7px 16px;transition:all .2s}
.btn-ghost:hover{background:rgba(28,20,10,.08);border-color:var(--ink);color:var(--ink)}
.btn-ghost.danger{border-color:var(--red);color:var(--red)}
.btn-ghost.danger:hover{background:rgba(168,32,32,.08)}
.tag-pill{background:transparent;border:1px solid rgba(28,20,10,.18);color:var(--muted);font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:4px 12px;transition:all .2s}
.tag-pill:hover,.tag-pill.active{background:rgba(28,20,10,.08);border-color:var(--ink);color:var(--ink)}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.empty{font-size:15px;color:var(--muted);font-style:italic;padding:48px 0;text-align:center}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.4}
.flex-between{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.flex-center{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mb14{margin-bottom:14px}
.divider{border:none;border-top:1px solid var(--bone);margin:20px 0}
@media(max-width:520px){.brand-name{font-size:26px}.nav-btn{padding:11px 8px;font-size:10px;letter-spacing:.12em}.photo-grid,.recipe-grid{columns:1}.modal-box{padding:22px 18px}}

/* DASHBOARD */
#app.dashboard-mode header nav{display:none}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
@media(max-width:480px){.dash-grid{grid-template-columns:1fr 1fr;gap:10px}}
.dash-card{background:var(--bone);border-top:3px solid var(--ink);padding:16px 14px 14px;cursor:pointer;transition:box-shadow .2s;display:block;border-bottom:1px solid rgba(28,20,10,.07);border-left:1px solid rgba(28,20,10,.07);border-right:1px solid rgba(28,20,10,.07)}
.dash-card:hover{box-shadow:0 4px 20px rgba(28,20,10,.13)}
.dash-card:active{opacity:.82}
.dash-card-icon{font-size:26px;margin-bottom:10px;display:block;opacity:.85}
.dash-card-name{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.dash-card-sub{font-size:12px;color:var(--muted);font-style:italic}
.dash-card-empty{font-size:11px;color:var(--warm);letter-spacing:.06em}
.dash-recent-row{padding:10px 0;border-bottom:1px solid var(--bone);display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.dash-recent-label{font-size:14px;color:var(--ink)}
.dash-recent-meta{font-size:10px;color:var(--muted);font-family:'Cormorant Garamond',serif;letter-spacing:.06em;margin-top:2px}
.dash-recent-tag{font-size:9px;color:var(--warm);letter-spacing:.12em;text-transform:uppercase;font-family:'Cormorant Garamond',serif;white-space:nowrap;flex-shrink:0;margin-top:2px}
</style>

// ── STATE ──
let currentUser=null,currentSection='home',capturedDataURL=null;
let panelFilter='all',panelMode='photos',homeView='rooms',activeRoomTab='overview';
let activeDayOutId=null,dragRoomIdx=null,activeMusicPlaylistId=null;
let currentUserEmail=null,currentUserName='User';
let _lpTimer=null,_lpFired=false;

function getStore(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function setStore(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function userData(k,d){return getStore(`maison_${currentUser}_${k}`,d);}
function saveData(k,v){setStore(`maison_${currentUser}_${k}`,v);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

// ── GOOGLE AUTH ──
function initGoogle(){
  google.accounts.id.initialize({client_id:'643043876163-9evtski9p2oqs4s1pg0nn4g1tnqdeiv8.apps.googleusercontent.com',callback:handleGoogleLogin,auto_select:false});
  google.accounts.id.renderButton(document.getElementById('g_signin_btn'),{theme:'outline',size:'large',text:'sign_in_with',shape:'rectangular',width:260});
}
function parseJwt(t){try{return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));}catch(e){return null;}}
function handleGoogleLogin(response){
  const p=parseJwt(response.credential);if(!p)return;
  currentUser=p.sub;currentUserEmail=p.email||null;currentUserName=p.name||p.email||'User';
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').classList.add('visible');
  setupFileInputs();showSection('dashboard');updatePanelBadge();
}
window.addEventListener('load',()=>{if(typeof google!=='undefined'&&google.accounts)initGoogle();else{const s=document.querySelector('script[src*="gsi"]');if(s)s.addEventListener('load',initGoogle);}});

function setupFileInputs(){
  document.getElementById('fp-file-input').onchange=function(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{const fp=userData('floorplan',{img:null,markers:[]});fp.img=ev.target.result;saveData('floorplan',fp);showSection('home');};r.readAsDataURL(f);this.value='';
  };
}

// ── NAV ──
function showSection(s){
  currentSection=s;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.section===s));
  document.getElementById('app').classList.toggle('dashboard-mode',s==='dashboard');
  const main=document.getElementById('main-content');
  if(s==='dashboard')renderDashboard(main);
  else if(s==='home')renderHome(main);
  else if(s==='wedding')renderWedding(main);
  else if(s==='honeymoon')renderHoneymoon(main);
  else if(s==='dayout')renderDayOut(main);
  else if(s==='recipes')renderRecipes(main);
  else if(s==='music')renderMusic(main);
}

// ── MODAL ──
function openModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal').style.display='flex';}
function closeModal(){document.getElementById('modal').style.display='none';document.getElementById('modal-box').innerHTML='';}

// ── SIDE PANEL ──
function openSidePanel(){renderSidePanel();document.getElementById('side-panel').classList.add('open');document.getElementById('panel-overlay').classList.add('open');document.body.style.overflow='hidden';}
function closeSidePanel(){document.getElementById('side-panel').classList.remove('open');document.getElementById('panel-overlay').classList.remove('open');document.body.style.overflow='';}
function setPanelFilter(f){
  panelFilter=f;
  document.querySelectorAll('.panel-filter').forEach(b=>{
    const t=b.textContent.trim().toLowerCase();

    b.classList.toggle('active',match);
  });
  renderSidePanel();
}
function getAllPhotos(archivedOnly=false){
  const all=[];

  home.rooms.forEach(r=>(r.photos||[]).filter(p=>archivedOnly?p.archived===true:!p.archived).forEach(p=>all.push({photo:p,type:'home_room',contextId:r.id,label:r.name,sectionKey:'home'})));
  const w=userData('wedding',{inspo:[]});
  (w.inspo||[]).filter(p=>archivedOnly?p.archived===true:!p.archived).forEach(p=>all.push({photo:p,type:'wedding',contextId:'wedding',label:'Wedding',sectionKey:'wedding'}));
  const h=userData('honeymoon',{rooms:[],inspo:[]});
  (h.inspo||[]).filter(p=>archivedOnly?p.archived===true:!p.archived).forEach(p=>all.push({photo:p,type:'honeymoon_inspo',contextId:'honeymoon',label:'Honeymoon',sectionKey:'honeymoon'}));
  h.rooms.forEach(r=>(r.photos||[]).filter(p=>archivedOnly?p.archived===true:!p.archived).forEach(p=>all.push({photo:p,type:'honeymoon_room',contextId:r.id,label:r.name,sectionKey:'honeymoon'})));
  const d=userData('dayout',{plans:[]});
  d.plans.forEach(pl=>(pl.photos||[]).filter(p=>archivedOnly?p.archived===true:!p.archived).forEach(p=>all.push({photo:p,type:'dayout_plan',contextId:pl.id,label:pl.name,sectionKey:'dayout'})));

function renderSidePanel(){
  if(panelMode==='links'){renderSidePanelLinks();return;}
  const isArchived=panelFilter==='archived';
  let all=getAllPhotos(isArchived);
  if(panelFilter==='liked')all=all.filter(e=>e.photo.liked);
  else if(panelFilter==='home')all=all.filter(e=>e.sectionKey==='home');
  else if(panelFilter==='wedding')all=all.filter(e=>e.sectionKey==='wedding');
  else if(panelFilter==='honeymoon')all=all.filter(e=>e.sectionKey==='honeymoon');
  else if(panelFilter==='dayout')all=all.filter(e=>e.sectionKey==='dayout');
  else if(panelFilter==='recipes')all=all.filter(e=>e.sectionKey==='recipes');
  const body=document.getElementById('panel-body');
  if(!all.length){body.innerHTML=`<div class="panel-empty">${isArchived?'No archived photos.':'No photos yet.'}</div>`;return;}
  if(isArchived){
    const groups={};all.forEach(e=>{if(!groups[e.label])groups[e.label]=[];groups[e.label].push(e);});
    body.innerHTML=Object.entries(groups).map(([l,items])=>`<div class="panel-section-label">${l}</div><div class="panel-grid">${items.map(e=>panelPhotoCard(e,true)).join('')}</div>`).join('');return;
  }
  const liked=all.filter(e=>e.photo.liked),rest=all.filter(e=>!e.photo.liked);
  let html='';
  if(liked.length&&panelFilter!=='liked')html+=`<div class="panel-pinned-label"><span>♥</span> Favourites</div><div class="panel-grid">${liked.map(e=>panelPhotoCard(e)).join('')}</div>`;
  if(rest.length){
    if(liked.length&&panelFilter!=='liked')html+=`<div class="panel-section-label" style="margin-top:18px">All Photos</div>`;
    const groups={};rest.forEach(e=>{if(!groups[e.label])groups[e.label]=[];groups[e.label].push(e);});
    Object.entries(groups).forEach(([l,items])=>{
      if(['all','liked'].includes(panelFilter))html+=`<div class="panel-section-label">${l}</div>`;
      html+=`<div class="panel-grid">${items.map(e=>panelPhotoCard(e)).join('')}</div>`;
    });
  }
  if(panelFilter==='liked'&&liked.length){const groups={};liked.forEach(e=>{if(!groups[e.label])groups[e.label]=[];groups[e.label].push(e);});html=Object.entries(groups).map(([l,items])=>`<div class="panel-section-label">${l}</div><div class="panel-grid">${items.map(e=>panelPhotoCard(e)).join('')}</div>`).join('');}
  body.innerHTML=html;
}
function panelPhotoCard(e,isArchived=false){
  const p=e.photo;
  if(isArchived)return`<div class="panel-photo"><img src="${p.img}" loading="lazy"/><div class="panel-photo-dest" style="transform:none">${e.label}</div><div class="panel-photo-arch-actions"><button class="arch-btn" style="background:rgba(42,95,63,.85)" onclick="restorePhoto('${p.id}','${e.type}','${e.contextId}')">↩ Restore</button><button class="arch-btn" style="background:rgba(168,32,32,.85)" onclick="deleteFromPanel('${p.id}','${e.type}','${e.contextId}')">✕ Delete</button></div></div>`;
  return`<div class="panel-photo"><img src="${p.img}" loading="lazy" onclick="navigateToPhoto('${e.type}','${e.contextId}','${e.sectionKey}')"/>${p.liked?'<div class="panel-photo-liked"></div>':''}<button class="panel-photo-like${p.liked?' on':''}" onclick="panelToggleLike('${p.id}','${e.type}','${e.contextId}')">♥</button><button class="panel-photo-move" onclick="openAssignPhoto('${p.id}','${e.type}','${e.contextId}')">↗</button><div class="panel-photo-dest">${e.label}</div></div>`;
}
function panelToggleLike(photoId,type,contextId){const arr=getPhotosArray(type,contextId);const p=arr.find(p=>p.id===photoId);if(p){p.liked=!p.liked;savePhotosArray(type,contextId,arr);}renderSidePanel();updatePanelBadge();showSection(currentSection);}
function restorePhoto(photoId,type,contextId){const arr=getPhotosArray(type,contextId);const p=arr.find(p=>p.id===photoId);if(p){p.archived=false;savePhotosArray(type,contextId,arr);}renderSidePanel();updatePanelBadge();showSection(currentSection);}
function deleteFromPanel(photoId,type,contextId){if(!confirm('Permanently delete?'))return;savePhotosArray(type,contextId,getPhotosArray(type,contextId).filter(p=>p.id!==photoId));renderSidePanel();updatePanelBadge();}
function openAssignPhoto(photoId,fromType,fromContextId){
  const home=userData('home',{rooms:[]});const h=userData('honeymoon',{rooms:[]});const d=userData('dayout',{plans:[]});
  const dests=[
    ...home.rooms.map(r=>({label:`${r.name} (Home)`,type:'home_room',contextId:r.id})),
    {label:'Wedding Inspiration',type:'wedding',contextId:'wedding'},
    {label:'Honeymoon Inspiration',type:'honeymoon_inspo',contextId:'honeymoon'},
    ...h.rooms.map(r=>({label:`${r.name} (Honeymoon)`,type:'honeymoon_room',contextId:r.id})),
    ...d.plans.map(pl=>({label:`${pl.name} (Day Out)`,type:'dayout_plan',contextId:pl.id}))
  ].filter(dest=>!(dest.type===fromType&&dest.contextId===fromContextId));
  if(!dests.length){alert('No other destinations available.');return;}
  openModal(`<div class="modal-head"><div class="modal-title">Move Photo To</div><button class="modal-close" onclick="closeModal()">×</button></div><div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">${dests.map(dest=>`<button class="btn-ghost" style="text-align:left" onclick="doMovePhoto('${photoId}','${fromType}','${fromContextId}','${dest.type}','${dest.contextId}')">${dest.label}</button>`).join('')}</div>`);
}
function doMovePhoto(photoId,fromType,fromContextId,toType,toContextId){
  const fromArr=getPhotosArray(fromType,fromContextId);const photo=fromArr.find(p=>p.id===photoId);if(!photo){closeModal();return;}
  savePhotosArray(fromType,fromContextId,fromArr.filter(p=>p.id!==photoId));
  const toArr=getPhotosArray(toType,toContextId);toArr.push(photo);savePhotosArray(toType,toContextId,toArr);
  closeModal();renderSidePanel();showSection(currentSection);updatePanelBadge();
}
function navigateToPhoto(type,contextId,sectionKey){
  closeSidePanel();
  if(sectionKey==='home'){activeRoomId=contextId;homeView='rooms';activeRoomTab='photos';showSection('home');}
  else if(sectionKey==='wedding'){weddingTab='inspo';showSection('wedding');}
  else if(sectionKey==='honeymoon'){if(type==='honeymoon_room')activeHoneymoonRoomId=contextId;honeymoonTab=type==='honeymoon_room'?'rooms':'inspo';showSection('honeymoon');}
  else if(sectionKey==='dayout'){activeDayOutId=contextId;showSection('dayout');}
  else if(sectionKey==='recipes'){closeSidePanel();showSection('recipes');}
}
function updatePanelBadge(){
  if(!currentUser)return;const liked=getAllPhotos(false).filter(e=>e.photo.liked).length;
  const badge=document.getElementById('panel-badge');if(badge){badge.textContent=liked;badge.classList.toggle('show',liked>0);}

// ── PHOTO HELPERS ──
function getPhotosArray(type,contextId){
  if(type==='home_room'){const home=userData('home',{rooms:[]});const room=home.rooms.find(r=>r.id===contextId);return room?(room.photos=room.photos||[],room.photos):[];}
  if(type==='wedding'){const w=userData('wedding',{inspo:[]});return w.inspo=w.inspo||[];}
  if(type==='honeymoon_room'){const h=userData('honeymoon',{rooms:[]});const room=h.rooms.find(r=>r.id===contextId);return room?(room.photos=room.photos||[],room.photos):[];}
  if(type==='honeymoon_inspo'){const h=userData('honeymoon',{rooms:[],inspo:[]});return h.inspo=h.inspo||[];}
  if(type==='dayout_plan'){const d=userData('dayout',{plans:[]});const pl=d.plans.find(p=>p.id===contextId);return pl?(pl.photos=pl.photos||[],pl.photos):[];}
  if(type==='recipe_photo'){const rec=userData('recipes',{items:[]});const item=rec.items.find(i=>i.id===contextId);return item?(item.photos=item.photos||[],item.photos):[];}
  return[];
}
function savePhotosArray(type,contextId,arr){
  if(type==='home_room'){const home=userData('home',{rooms:[]});const room=home.rooms.find(r=>r.id===contextId);if(room){room.photos=arr;saveData('home',home);}}
  else if(type==='wedding'){const w=userData('wedding',{inspo:[]});w.inspo=arr;saveData('wedding',w);}
  else if(type==='honeymoon_room'){const h=userData('honeymoon',{rooms:[]});const room=h.rooms.find(r=>r.id===contextId);if(room){room.photos=arr;saveData('honeymoon',h);}}
  else if(type==='honeymoon_inspo'){const h=userData('honeymoon',{rooms:[],inspo:[]});h.inspo=arr;saveData('honeymoon',h);}
  else if(type==='dayout_plan'){const d=userData('dayout',{plans:[]});const pl=d.plans.find(p=>p.id===contextId);if(pl){pl.photos=arr;saveData('dayout',d);}}
  else if(type==='recipe_photo'){const rec=userData('recipes',{items:[]});const item=rec.items.find(i=>i.id===contextId);if(item){item.photos=arr;saveData('recipes',rec);}}
}
function startLongPress(event,photoId,type,contextId){
  _lpFired=false;
  _lpTimer=setTimeout(()=>{
    _lpFired=true;
    const card=event.target.closest('.photo-card');
    if(card){card.classList.add('pressing');setTimeout(()=>card.classList.remove('pressing'),400);}
    openAssignPhoto(photoId,type,contextId);
  },600);
}
function cancelLongPress(){if(_lpTimer){clearTimeout(_lpTimer);_lpTimer=null;}}
function toggleLike(photoId,type,contextId){const arr=getPhotosArray(type,contextId);const p=arr.find(p=>p.id===photoId);if(p)p.liked=!p.liked;savePhotosArray(type,contextId,arr);showSection(currentSection);updatePanelBadge();}
function archivePhoto(photoId,type,contextId){const arr=getPhotosArray(type,contextId);const p=arr.find(p=>p.id===photoId);if(p){p.archived=true;savePhotosArray(type,contextId,arr);}showSection(currentSection);updatePanelBadge();}
function deletePhoto(photoId,type,contextId){if(!confirm('Permanently delete this photo?'))return;savePhotosArray(type,contextId,getPhotosArray(type,contextId).filter(p=>p.id!==photoId));showSection(currentSection);updatePanelBadge();}
function viewPhoto(photoId,type,contextId){const p=getPhotosArray(type,contextId).find(p=>p.id===photoId);if(!p)return;openModal(`<div class="modal-head"><div class="modal-title">${p.note||'Photo'}</div><button class="modal-close" onclick="closeModal()">×</button></div><img src="${p.img}" style="width:100%;max-height:360px;object-fit:contain;border:1px solid var(--bone);margin-bottom:12px"/>${p.note?`<p style="font-size:15px;line-height:1.6;margin-bottom:10px">${p.note}</p>`:''}${p.link?`<a href="${p.link}" target="_blank" rel="noopener" style="font-size:13px;color:var(--muted);word-break:break-all">🔗 ${p.link}</a>`:''}${p.price?`<div style="font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--green);margin-top:8px">£${p.price.toLocaleString(undefined,{minimumFractionDigits:2})}</div>`:''}`); }

  const visible=(photos||[]).filter(p=>!p.archived);

function pickFile(src){const fi=src==='camera'?document.getElementById('file-input-camera'):document.getElementById('file-input');fi.onchange=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{capturedDataURL=ev.target.result;const pw=document.getElementById('cap-preview-wrap');if(pw){pw.style.display='block';document.getElementById('cap-preview').src=capturedDataURL;}};r.readAsDataURL(file);fi.value='';};fi.click();}
function saveCapture(){
  if(!capturedDataURL){alert('Please select a photo first.');return;}
  const dest=document.getElementById('cap-dest').value;
  const note=document.getElementById('cap-note').value.trim(),link=document.getElementById('cap-link').value.trim();
  const price=parseFloat(document.getElementById('cap-price').value)||0,name=document.getElementById('cap-name').value.trim();
  const photo={id:uid(),img:capturedDataURL,note,link,price,name,date:Date.now(),liked:false,archived:false};
  if(dest.startsWith('home_')){const home=userData('home',{rooms:[]});const room=home.rooms.find(r=>r.id===dest.replace('home_',''));if(room){room.photos=room.photos||[];room.photos.push(photo);saveData('home',home);}}
  else if(dest==='wedding'){const w=userData('wedding',{inspo:[]});w.inspo.push(photo);saveData('wedding',w);}
  else if(dest==='honeymoon'){const h=userData('honeymoon',{rooms:[],inspo:[],budget:0});if(!h.inspo)h.inspo=[];h.inspo.push(photo);saveData('honeymoon',h);}
  else if(dest.startsWith('dayout_')){const d=userData('dayout',{plans:[]});const pl=d.plans.find(p=>p.id===dest.replace('dayout_',''));if(pl){pl.photos=pl.photos||[];pl.photos.push(photo);saveData('dayout',d);}}
  else if(dest==='recipes_new'||dest==='recipes'){const r=userData('recipes',{items:[]});r.items.push({id:uid(),img:capturedDataURL,title:name||'New Recipe',tags:[],text:note,date:Date.now(),photos:[]});saveData('recipes',r);}
  else if(dest.startsWith('recipe_')){const recId=dest.replace('recipe_','');const r=userData('recipes',{items:[]});const ri=r.items.find(i=>i.id===recId);if(ri){ri.photos=ri.photos||[];ri.photos.push({id:uid(),img:capturedDataURL,note,date:Date.now(),liked:false,archived:false});saveData('recipes',r);}}
  capturedDataURL=null;closeModal();showSection(currentSection);updatePanelBadge();
}

function quickNotesBtn(section){

function openQuickNotes(section){

// ── DRAG ROOMS ──
function dragRoomStart(e,idx){dragRoomIdx=idx;e.dataTransfer.effectAllowed='move';setTimeout(()=>e.target.style.opacity='.45',0);}
function dragRoomOver(e,idx){e.preventDefault();document.querySelectorAll('.room-tab[draggable]').forEach(t=>t.classList.remove('drag-over'));if(idx!==dragRoomIdx)e.currentTarget.classList.add('drag-over');}
function dragRoomLeave(e){e.currentTarget.classList.remove('drag-over');}
function dropRoom(e,idx,section='home'){
  e.preventDefault();if(dragRoomIdx===null||dragRoomIdx===idx)return;
  if(section==='home'){const home=userData('home',{rooms:[]});const[m]=home.rooms.splice(dragRoomIdx,1);home.rooms.splice(idx,0,m);saveData('home',home);}
  else if(section==='dayout'){const d=userData('dayout',{plans:[]});const[m]=d.plans.splice(dragRoomIdx,1);d.plans.splice(idx,0,m);saveData('dayout',d);}
  dragRoomIdx=null;document.querySelectorAll('.room-tab[draggable]').forEach(t=>{t.classList.remove('drag-over');t.style.opacity='1';});showSection(section);
}
function dragRoomEnd(e){e.target.style.opacity='1';document.querySelectorAll('.room-tab[draggable]').forEach(t=>t.classList.remove('drag-over'));dragRoomIdx=null;}

// ── HOME ──
let activeRoomId=null;
function setHomeView(v){homeView=v;showSection('home');}
function setRoomTab(t){activeRoomTab=t;showSection('home');}
function setActiveRoom(id){if(id!==activeRoomId)activeRoomTab='overview';activeRoomId=id;showSection('home');}

function renderHome(main){
  const home=userData('home',{rooms:[]});
  const viewToggle=`<div class="home-view-tabs"><button class="home-view-tab${homeView==='rooms'?' active':''}" onclick="setHomeView('rooms')">Rooms</button><button class="home-view-tab${homeView==='floorplan'?' active':''}" onclick="setHomeView('floorplan')">Floor Plan</button></div>`;
  if(homeView==='floorplan'){main.innerHTML=`<div class="section-rule"><div><div class="section-title">Our Home</div><div class="section-sub">Visualise your space.</div></div>${quickNotesBtn('home')}</div>${viewToggle}${renderFloorPlanView()}`;return;}
  if(!home.rooms.length){main.innerHTML=`<div class="section-rule"><div><div class="section-title">Our Home</div><div class="section-sub">Add rooms to start planning.</div></div><div class="flex-center">${quickNotesBtn('home')}<button class="btn-solid sm" onclick="openAddRoom()">+ Add Room</button></div></div>${viewToggle}<div class="empty"><div class="empty-icon">🏠</div>No rooms yet.</div>`;return;}
  if(!activeRoomId||!home.rooms.find(r=>r.id===activeRoomId))activeRoomId=home.rooms[0].id;
  const room=home.rooms.find(r=>r.id===activeRoomId);
  const tabs=home.rooms.map((r,i)=>`<button class="room-tab${r.id===activeRoomId?' active':''}" draggable="true" ondragstart="dragRoomStart(event,${i})" ondragover="dragRoomOver(event,${i})" ondragleave="dragRoomLeave(event)" ondrop="dropRoom(event,${i},'home')" ondragend="dragRoomEnd(event)" onclick="setActiveRoom('${r.id}')"><span class="drag-handle">⋮⋮</span>${r.name}</button>`).join('');
  const subTabs=['overview','photos','moodboard'].map(t=>`<button class="room-sub-tab${activeRoomTab===t?' active':''}" onclick="setRoomTab('${t}')">${t==='overview'?'Overview':t==='photos'?'Photos':'Mood Board'}</button>`).join('');
  let content='';
  if(activeRoomTab==='overview'){
    const photos=room.photos||[],items=room.items||[];
    const budget=room.budget||0,spent=items.reduce((s,it)=>s+(it.price||0),0)+photos.filter(p=>!p.archived).reduce((s,p)=>s+(p.price||0),0);
    const pct=budget>0?Math.min(spent/budget*100,100):0,over=budget>0&&spent>budget;
    content=`<div class="budget-block"><div class="budget-row"><div><div class="budget-label">${room.name} Budget</div><div class="budget-amount${over?' over':''}">£${spent.toLocaleString(undefined,{minimumFractionDigits:2})} <span style="font-size:14px;color:var(--muted)">/ £${(budget||0).toLocaleString()}</span></div></div><button class="btn-ghost" onclick="editRoomBudget('${room.id}')">Edit</button></div><div class="bar-track"><div class="bar-fill${over?' over':''}" style="width:${pct}%"></div></div><div class="bar-note${over?' over':''}">${over?'Over budget':'Remaining: £'+(budget-spent).toLocaleString(undefined,{minimumFractionDigits:2})}</div></div>
      <div class="flex-between mb14"><div style="font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)">Furniture &amp; Items</div><div class="flex-center"><button class="btn-ghost" onclick="openAddItem('${room.id}')">+ Add Item</button><button class="btn-ghost danger" onclick="deleteRoom('${room.id}')">Delete Room</button></div></div>
      ${renderItemList(items,room.id)}`;
  } else if(activeRoomTab==='photos'){
    content=renderPhotoGrid(room.photos||[],'home_room',room.id);
  } else {
    content=renderRoomMoodboard(room);
  }
  main.innerHTML=`<div class="section-rule"><div><div class="section-title">Our Home</div><div class="section-sub">Track every room, budget &amp; piece of furniture.</div></div><div class="flex-center">${quickNotesBtn('home')}<button class="btn-solid sm" onclick="openAddRoom()">+ Room</button></div></div>${viewToggle}<div class="room-tabs-row">${tabs}</div><div class="room-sub-tabs">${subTabs}</div>${content}`;
}

function renderItemList(items,roomId){
  if(!items.length)return`<div class="empty" style="padding:20px 0;font-size:13px">No items yet.</div>`;
  return items.map(it=>`<div class="item-row">${it.img?`<img class="item-thumb" src="${it.img}"/>`:`<div class="item-thumb-ph">🛋</div>`}<div class="item-body"><div class="item-name">${it.name||'Item'}</div>${it.store?`<div class="item-store">${it.store}</div>`:''}${it.link?`<a class="item-link" href="${it.link}" target="_blank" rel="noopener">${it.link}</a>`:''}</div>${it.price?`<div class="item-price">£${it.price.toLocaleString(undefined,{minimumFractionDigits:2})}</div>`:''}<button class="icon-btn" onclick="deleteItem('${roomId}','${it.id}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button></div>`).join('');
}

// ── ROOM MOOD BOARD ──
function renderRoomMoodboard(room){
  const mb=room.moodboard||{colors:[],tiles:[],notes:''};
  const swatches=mb.colors.length?mb.colors.map((c,i)=>`<div class="mb-swatch-wrap"><div class="mb-swatch" style="background:${c.hex}" title="${c.ral?'RAL '+c.ral:''}"></div><button class="mb-swatch-del" onclick="removeRoomColor('${room.id}',${i})">×</button><div class="mb-swatch-label">${c.ral?'RAL '+c.ral:c.name||''}</div></div>`).join(''):`<p style="font-size:13px;color:var(--muted);font-style:italic">No colours yet.</p>`;
  const tiles=mb.tiles&&mb.tiles.length?mb.tiles.map((tile,ti)=>`<div style="position:relative;overflow:hidden;border:1px solid var(--bone);display:inline-block;vertical-align:top"><img src="${tile.img}" style="width:${tile.size==='sm'?120:tile.size==='lg'?250:180}px;height:${tile.size==='sm'?90:tile.size==='lg'?180:130}px;object-fit:cover;display:block"/><button onclick="removeRoomMoodTile('${room.id}',${ti})" style="position:absolute;top:3px;right:3px;background:rgba(168,32,32,.85);border:none;color:#fff;width:18px;height:18px;font-size:11px;cursor:pointer">×</button></div>`).join(''):`<p style="font-size:13px;color:var(--muted);font-style:italic">No images yet.</p>`;
  return`<div style="margin-bottom:20px">
    <div class="flex-between mb14"><div style="font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)">Colour Palette</div><button class="btn-ghost" onclick="openAddColor('${room.id}')">+ Add Colour</button></div>
    <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px">${swatches}</div>
    <div class="flex-between mb14"><div style="font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)">Inspiration Images</div><button class="btn-ghost" onclick="openAddRoomMoodTile('${room.id}')">+ Add Image</button></div>
    <div style="display:flex;flex-wrap:wrap;gap:10px">${tiles}</div>
    ${mb.notes?`<div style="margin-top:14px;font-size:13px;color:var(--muted);font-style:italic">${mb.notes}</div>`:''}
  </div>`;
}

function openAddColor(roomId){
  const dropperBtn=typeof EyeDropper!=='undefined'?`<button class="btn-ghost" style="margin-bottom:14px;width:100%" onclick="useDropper('${roomId}')">🎯 Pick Colour from Screen</button>`:`<p style="font-size:11px;color:var(--muted);margin-bottom:14px;font-style:italic">Screen colour picker available in Chrome/Edge.</p>`;
  openModal(`<div class="modal-head"><div class="modal-title">Add Colour</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <label class="field-label">Colour Picker</label>
    <input id="color-picker" type="color" value="#c9b89a" class="color-picker-input"/>
    ${dropperBtn}
    <label class="field-label">Or Enter RAL Number</label>
    <div class="ral-row mb14">
      <input id="ral-input" class="field-input" placeholder="e.g. 9010" style="margin-bottom:0" oninput="previewRal(this.value)"/>
      <div id="ral-preview" class="ral-preview-box"></div>
    </div>
    <div id="ral-name" style="font-size:12px;color:var(--muted);margin-bottom:14px;font-style:italic;margin-top:-12px"></div>
    <label class="field-label">Colour Name (optional)</label>
    <input id="color-name" class="field-input" placeholder="e.g. Cornish Cream…"/>
    <div class="modal-row">
      <button class="btn-solid sm" onclick="saveColor('${roomId}')">Add Colour</button>
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}

function previewRal(val){
  const clean=val.trim().replace(/^RAL\s*/i,'');
  const hex=RAL[clean],name=RAL_NAMES[clean]||'';
  const preview=document.getElementById('ral-preview'),nameEl=document.getElementById('ral-name');
  if(preview)preview.style.background=hex||'transparent';
  if(nameEl)nameEl.textContent=hex?`RAL ${clean} — ${name}`:clean.length>=4?'RAL number not found':'';
}

function saveColor(roomId){
  const ralRaw=(document.getElementById('ral-input')?.value||'').trim().replace(/^RAL\s*/i,'');
  const pickerVal=document.getElementById('color-picker')?.value||'#808080';
  const nameVal=(document.getElementById('color-name')?.value||'').trim();
  let hex,ral=null,name=nameVal;
  if(ralRaw&&RAL[ralRaw]){hex=RAL[ralRaw];ral=ralRaw;if(!name)name=RAL_NAMES[ralRaw]||'';}
  else hex=pickerVal;
  const home=userData('home',{rooms:[]});const room=home.rooms.find(r=>r.id===roomId);if(!room)return;
  room.moodboard=room.moodboard||{colors:[],tiles:[],notes:''};
  room.moodboard.colors.push({id:uid(),hex,ral,name});
  saveData('home',home);closeModal();showSection('home');
}

function removeRoomColor(roomId,idx){
  const home=userData('home',{rooms:[]});const room=home.rooms.find(r=>r.id===roomId);
  if(room&&room.moodboard){room.moodboard.colors.splice(idx,1);saveData('home',home);}showSection('home');
}

async function useDropper(roomId){
  try{const dropper=new EyeDropper();const result=await dropper.open();const picker=document.getElementById('color-picker');if(picker)picker.value=result.sRGBHex;}catch(e){}
}

function openAddRoomMoodTile(roomId){
  const fi=document.getElementById('rm-tile-input');
  fi.onchange=e=>{
    Array.from(e.target.files).forEach(file=>{const r=new FileReader();r.onload=ev=>{const home=userData('home',{rooms:[]});const room=home.rooms.find(r=>r.id===roomId);if(!room)return;room.moodboard=room.moodboard||{colors:[],tiles:[],notes:''};room.moodboard.tiles=room.moodboard.tiles||[];room.moodboard.tiles.push({id:uid(),img:ev.target.result,size:'md'});saveData('home',home);showSection('home');};r.readAsDataURL(file);});fi.value='';
  };fi.click();
}

function removeRoomMoodTile(roomId,idx){const home=userData('home',{rooms:[]});const room=home.rooms.find(r=>r.id===roomId);if(room&&room.moodboard){room.moodboard.tiles.splice(idx,1);saveData('home',home);}showSection('home');}

// ── FLOOR PLAN ──
function renderFloorPlanView(){
  const fp=userData('floorplan',{img:null,markers:[]});
  if(!fp.img)return`<div style="text-align:center;padding:48px 20px"><div style="font-size:48px;opacity:.3;margin-bottom:16px">🏠</div><p style="font-size:15px;color:var(--muted);font-style:italic;margin-bottom:20px">Upload a floor plan image to get started</p><button class="btn-solid sm" onclick="document.getElementById('fp-file-input').click()">Upload Floor Plan</button><p style="font-size:11px;color:var(--muted);margin-top:12px;font-style:italic">Supports JPG and PNG</p></div>`;
  return`<div class="flex-between mb14"><p style="font-size:12px;color:var(--muted);font-style:italic">Tap an empty area to pin a room</p><div class="flex-center"><button class="btn-ghost" onclick="document.getElementById('fp-file-input').click()">Replace</button><button class="btn-ghost danger" onclick="clearFloorPlan()">Remove</button></div></div>
  <div class="fp-container" onclick="floorPlanClick(event)"><img src="${fp.img}" class="fp-img"/>${fp.markers.map(m=>`<div class="fp-marker" style="left:${m.x}%;top:${m.y}%" onclick="event.stopPropagation();navigateFromMarker('${m.roomId}')">${m.label.charAt(0).toUpperCase()}<div class="fp-label">${m.label}</div><button class="fp-del" onclick="event.stopPropagation();deleteMarker('${m.id}')">×</button></div>`).join('')}</div>`;
}
function floorPlanClick(e){if(e.target.closest('.fp-marker'))return;const rect=e.currentTarget.getBoundingClientRect();const x=((e.clientX-rect.left)/rect.width*100).toFixed(1);const y=((e.clientY-rect.top)/rect.height*100).toFixed(1);openAddMarkerModal(parseFloat(x),parseFloat(y));}
function openAddMarkerModal(x,y){const home=userData('home',{rooms:[]});if(!home.rooms.length){alert('Add some rooms first.');return;}openModal(`<div class="modal-head"><div class="modal-title">Pin a Room</div><button class="modal-close" onclick="closeModal()">×</button></div><label class="field-label">Select Room</label><select id="marker-room" class="field-input">${home.rooms.map(r=>`<option value="${r.id}">${r.name}</option>`).join('')}</select><div class="modal-row"><button class="btn-solid sm" onclick="saveMarker(${x},${y})">Add Pin</button><button class="btn-ghost" onclick="closeModal()">Cancel</button></div>`);}
function saveMarker(x,y){const roomId=document.getElementById('marker-room').value;const home=userData('home',{rooms:[]});const room=home.rooms.find(r=>r.id===roomId);if(!room)return;const fp=userData('floorplan',{img:null,markers:[]});fp.markers.push({id:uid(),x,y,roomId,label:room.name});saveData('floorplan',fp);closeModal();showSection('home');}
function deleteMarker(markerId){const fp=userData('floorplan',{img:null,markers:[]});fp.markers=fp.markers.filter(m=>m.id!==markerId);saveData('floorplan',fp);showSection('home');}
function navigateFromMarker(roomId){activeRoomId=roomId;homeView='rooms';activeRoomTab='overview';showSection('home');}
function clearFloorPlan(){if(!confirm('Remove the floor plan?'))return;saveData('floorplan',{img:null,markers:[]});showSection('home');}

// ── HOME CRUD ──
function openAddRoom(){openModal(`<div class="modal-head"><div class="modal-title">Add Room</div><button class="modal-close" onclick="closeModal()">×</button></div><label class="field-label">Room Name</label><input id="new-room-name" class="field-input" placeholder="e.g. Living Room…"/><label class="field-label">Budget (optional)</label><input id="new-room-budget" class="field-input" type="number" placeholder="0.00" min="0" step="0.01"/><div class="modal-row"><button class="btn-solid sm" onclick="saveRoom()">Create Room</button><button class="btn-ghost" onclick="closeModal()">Cancel</button></div>`);}
function saveRoom(){const name=document.getElementById('new-room-name').value.trim();if(!name)return;const budget=parseFloat(document.getElementById('new-room-budget').value)||0;const home=userData('home',{rooms:[]});const id=uid();home.rooms.push({id,name,budget,photos:[],items:[],moodboard:{colors:[],tiles:[],notes:''}});saveData('home',home);activeRoomId=id;activeRoomTab='overview';closeModal();showSection('home');}
function editRoomBudget(roomId){const home=userData('home',{rooms:[]});const room=home.rooms.find(r=>r.id===roomId);openModal(`<div class="modal-head"><div class="modal-title">Edit Budget</div><button class="modal-close" onclick="closeModal()">×</button></div><label class="field-label">${room.name}</label><input id="edit-budget" class="field-input" type="number" value="${room.budget||0}" min="0" step="0.01"/><div class="modal-row"><button class="btn-solid sm" onclick="saveRoomBudget('${roomId}')">Save</button><button class="btn-ghost" onclick="closeModal()">Cancel</button></div>`);}

function openAddItem(roomId){openModal(`<div class="modal-head"><div class="modal-title">Add Item</div><button class="modal-close" onclick="closeModal()">×</button></div><label class="field-label">Item Name</label><input id="item-name" class="field-input" placeholder="e.g. IKEA Kallax"/><label class="field-label">Store</label><input id="item-store" class="field-input" placeholder="e.g. IKEA…"/><label class="field-label">Link</label><input id="item-link" class="field-input" type="url" placeholder="https://…"/><label class="field-label">Price</label><input id="item-price" class="field-input" type="number" placeholder="0.00" min="0" step="0.01"/><label class="field-label">Photo (optional)</label><button class="btn-ghost" onclick="pickItemPhoto()">Choose Photo</button><img id="item-img-preview" style="display:none;max-height:120px;margin-top:8px"/><input type="file" id="item-file" accept="image/*" style="display:none"/><div class="modal-row" style="margin-top:14px"><button class="btn-solid sm" onclick="saveItem('${roomId}')">Add to Room</button><button class="btn-ghost" onclick="closeModal()">Cancel</button></div>`);}
let itemImgData=null;
function pickItemPhoto(){itemImgData=null;const fi=document.getElementById('item-file');fi.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{itemImgData=ev.target.result;const p=document.getElementById('item-img-preview');p.src=itemImgData;p.style.display='block';};r.readAsDataURL(f);};fi.click();}

function deleteItem(roomId,itemId){const home=userData('home',{rooms:[]});const room=home.rooms.find(r=>r.id===roomId);if(room){room.items=(room.items||[]).filter(i=>i.id!==itemId);saveData('home',home);}showSection('home');}

// ── DAYS OUT ──
function renderDayOut(main){
  const d=userData('dayout',{plans:[]});
  if(!d.plans.length){main.innerHTML=`<div class="section-rule"><div><div class="section-title">Days Out</div><div class="section-sub">Plan trips, days out &amp; adventures.</div></div><button class="btn-solid sm teal" onclick="openAddDayOutPlan()">+ Add Plan</button></div><div class="empty"><div class="empty-icon">🗺️</div>No plans yet. Add your first day out!</div>`;return;}
  if(!activeDayOutId||!d.plans.find(p=>p.id===activeDayOutId))activeDayOutId=d.plans[0].id;
  const plan=d.plans.find(p=>p.id===activeDayOutId);
  const photos=plan.photos||[],items=plan.items||[];
  const budget=plan.budget||0,spent=items.reduce((s,it)=>s+(it.price||0),0)+photos.filter(p=>!p.archived).reduce((s,p)=>s+(p.price||0),0);
  const pct=budget>0?Math.min(spent/budget*100,100):0,over=budget>0&&spent>budget;

let activeHoneymoonRoomId=null,honeymoonTab='inspo';

  const h=userData('honeymoon',{rooms:[],inspo:[],budget:0});
  const inspo=h.inspo||[],budget=h.budget||0;

  const pct=budget>0?Math.min(spent/budget*100,100):0,over=budget>0&&spent>budget;
  const tabs=['inspo','rooms','budget'].map(t=>`<button class="room-tab${honeymoonTab===t?' active':''}" onclick="setHoneymoonTab('${t}')">${t==='inspo'?'Inspiration':t==='rooms'?'Destinations':'Budget'}</button>`).join('');

      if(!activeHoneymoonRoomId||!h.rooms.find(r=>r.id===activeHoneymoonRoomId))activeHoneymoonRoomId=h.rooms[0].id;

      const rSpent=(room.items||[]).reduce((s,i)=>s+(i.price||0),0)+(room.photos||[]).reduce((s,p)=>s+(p.price||0),0);

      inner=`<div class="room-tabs-row">${h.rooms.map(r=>`<button class="room-tab${r.id===activeHoneymoonRoomId?' active':''}" onclick="setActiveHoneymoonRoom('${r.id}')">${r.name}</button>`).join('')}</div>

    }
    content=`<div class="flex-between mb14"><div></div><div class="flex-center"><button class="btn-solid sm" onclick="openAddHoneymoonRoom()">+ Destination</button>${h.rooms.length?`<button class="btn-ghost danger" onclick="deleteHoneymoonRoom('${activeHoneymoonRoomId}')">Delete</button>`:''}</div></div>`+inner;
  } else {
    content=`<div class="budget-block"><div class="budget-row"><div><div class="budget-label">Total Budget</div><div class="budget-amount${over?' over':''}">£${spent.toLocaleString(undefined,{minimumFractionDigits:2})} / £${budget.toLocaleString()}</div></div><button class="btn-ghost" onclick="editOverallHoneymoonBudget()">Edit</button></div><div class="bar-track"><div class="bar-fill${over?' over':''}" style="width:${pct}%"></div></div><div class="bar-note${over?' over':''}">${over?'Over budget':'Remaining: £'+(budget-spent).toLocaleString(undefined,{minimumFractionDigits:2})}</div></div><div style="margin-top:18px">${h.rooms.map(r=>{const rs=(r.items||[]).reduce((s,i)=>s+(i.price||0),0);return`<div class="item-row"><div class="item-body"><div class="item-name">${r.name}</div><div class="item-store">Budget: £${(r.budget||0).toLocaleString()}</div></div><div class="item-price">£${rs.toLocaleString(undefined,{minimumFractionDigits:2})}</div></div>`;}).join('')}</div>`;
  }
  main.innerHTML=`<div class="section-rule"><div><div class="section-title">Honeymoon</div><div class="section-sub">Plan your perfect getaway.</div></div>${quickNotesBtn('honeymoon')}</div><div class="room-tabs-row">${tabs}</div>${content}`;
}

let recipeFilter='All';

  const r=userData('recipes',{items:[]});const allTags=['All',...new Set(r.items.flatMap(i=>i.tags||[]))];const filtered=recipeFilter==='All'?r.items:r.items.filter(i=>(i.tags||[]).includes(recipeFilter));
