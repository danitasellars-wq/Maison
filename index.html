function openAddRecipe(){openModal(`<div class="modal-head"><div class="modal-title">Add Recipe</div><button class="modal-close" onclick="closeModal()">×</button></div><label class="field-label">Recipe Name</label><input id="rec-title" class="field-input" placeholder="e.g. Roast Chicken…"/><label class="field-label">Tags (comma separated)</label><input id="rec-tags" class="field-input" placeholder="Dinner, Italian…"/><label class="field-label">Recipe / Notes</label><textarea id="rec-text" class="field-input" rows="6" placeholder="Ingredients and method…"></textarea><label class="field-label">Photo (optional)</label><button class="btn-ghost" onclick="pickRecipePhoto()">Choose Photo</button><img id="rec-img-preview" style="display:none;max-height:140px;margin-top:8px"/><input type="file" id="rec-file" accept="image/*" style="display:none"/><div class="modal-row" style="margin-top:14px"><button class="btn-solid sm" onclick="saveRecipe()">Save Recipe</button><button class="btn-ghost" onclick="closeModal()">Cancel</button></div>`);}
let recipeImgData=null;
function pickRecipePhoto(){recipeImgData=null;const fi=document.getElementById('rec-file');fi.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{recipeImgData=ev.target.result;const p=document.getElementById('rec-img-preview');p.src=recipeImgData;p.style.display='block';};r.readAsDataURL(f);};fi.click();}
function saveRecipe(){const title=document.getElementById('rec-title').value.trim();if(!title)return;const tags=document.getElementById('rec-tags').value.split(',').map(t=>t.trim()).filter(Boolean);const text=document.getElementById('rec-text').value.trim();const r=userData('recipes',{items:[]});r.items.push({id:uid(),title,tags,text,img:recipeImgData||null,date:Date.now()});recipeImgData=null;saveData('recipes',r);closeModal();showSection('recipes');}
function viewRecipe(id){
  const item=userData('recipes',{items:[]}).items.find(i=>i.id===id);if(!item)return;
  const extraPhotos=item.photos||[];
  const photosHtml=extraPhotos.length?`<div style="margin-top:16px"><div style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-family:'Cormorant Garamond',serif;margin-bottom:8px">Extra Photos</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px">${extraPhotos.map((p,i)=>`<div style="position:relative;aspect-ratio:1;overflow:hidden;background:var(--bone);border:1px solid var(--bone)"><img src="${p.img}" style="width:100%;height:100%;object-fit:cover;display:block"/><button onclick="deleteRecipePhoto('${id}',${i})" style="position:absolute;top:3px;right:3px;background:rgba(168,32,32,.85);border:none;color:#fff;width:18px;height:18px;font-size:10px;cursor:pointer;line-height:1">×</button></div>`).join('')}</div></div>`:'';
  openModal(`<div class="modal-head"><div class="modal-title">${item.title}</div><button class="modal-close" onclick="closeModal()">×</button></div>${item.img?`<img src="${item.img}" class="modal-preview"/>`:''}${item.text?`<div style="margin-top:12px;font-size:15px;line-height:1.75;white-space:pre-wrap">${item.text}</div>`:''}<input type="file" id="rec-extra-photo" accept="image/*" style="display:none"/>${photosHtml}<div class="modal-row" style="margin-top:16px"><button class="btn-ghost" onclick="addPhotoToRecipe('${id}')">📷 Add Photo</button><button class="btn-ghost danger" onclick="deleteRecipe('${id}');closeModal()">Delete</button></div>`);
}
function addPhotoToRecipe(recipeId){
  const fi=document.getElementById('rec-extra-photo');if(!fi)return;
  fi.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const rec=userData('recipes',{items:[]});const item=rec.items.find(i=>i.id===recipeId);if(!item)return;item.photos=item.photos||[];item.photos.push({id:uid(),img:ev.target.result,date:Date.now(),liked:false,archived:false});saveData('recipes',rec);viewRecipe(recipeId);};r.readAsDataURL(f);fi.value='';};fi.click();
}
function deleteRecipePhoto(recipeId,idx){const rec=userData('recipes',{items:[]});const item=rec.items.find(i=>i.id===recipeId);if(item&&item.photos){item.photos.splice(idx,1);saveData('recipes',rec);}viewRecipe(recipeId);}
function deleteRecipe(id){if(!confirm('Delete this recipe?'))return;const r=userData('recipes',{items:[]});r.items=r.items.filter(i=>i.id!==id);saveData('recipes',r);showSection('recipes');}

// ── MOOD BOARD (global) ──
function renderMoodBoardSection(context){
  const boards=userData(`moodboards_${context}`,[]);
  if(!boards.length)return`<div class="empty"><div class="empty-icon">🎨</div>No mood boards yet.</div><div style="text-align:center;margin-top:16px"><button class="btn-solid sm" onclick="createMoodBoard('${context}')">Create Mood Board</button></div>`;
  return`<div class="flex-between mb14"><div></div><button class="btn-solid sm" onclick="createMoodBoard('${context}')">+ New Board</button></div>${boards.map((board,bi)=>`<div style="margin-bottom:32px"><div class="flex-between mb14"><div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700">${board.title||'Untitled'}</div><div class="flex-center"><button class="btn-ghost" onclick="openEditBoard('${context}',${bi})">Edit</button><button class="btn-ghost danger" onclick="deleteMoodBoard('${context}',${bi})">Delete</button></div></div>${board.palette&&board.palette.length?`<div class="mood-palette">${board.palette.map(c=>`<div class="palette-swatch" style="background:${c}"></div>`).join('')}</div>`:''}<div class="mood-board${!board.tiles||!board.tiles.length?' empty-board':''}">${!board.tiles||!board.tiles.length?'<span style="color:var(--muted);font-style:italic;font-size:14px">Empty. Edit to add images.</span>':board.tiles.map(tile=>`<div class="mood-tile size-${tile.size||'md'}"><img src="${tile.img}" loading="lazy"/>${tile.note?`<div class="tile-note">${tile.note}</div>`:''}</div>`).join('')}</div>${board.notes?`<div style="font-size:13px;color:var(--muted);margin-top:10px;font-style:italic">${board.notes}</div>`:''}</div>`).join('')}`;
}
function openMoodBoard(){openModal(`<div class="modal-head"><div class="modal-title">Create Mood Board</div><button class="modal-close" onclick="closeModal()">×</button></div><p style="font-size:14px;color:var(--muted);margin-bottom:18px;font-style:italic">Which section?</p><div style="display:flex;flex-direction:column;gap:10px"><button class="btn-ghost" onclick="closeModal();createMoodBoard('wedding');setWeddingTab('moodboard');showSection('wedding')">Wedding</button><button class="btn-ghost" onclick="closeModal();createMoodBoard('home');showSection('home')">Our Home</button><button class="btn-ghost" onclick="closeModal();createMoodBoard('honeymoon');showSection('honeymoon')">Honeymoon</button></div>`);}
function createMoodBoard(context){openModal(`<div class="modal-head"><div class="modal-title">New Mood Board</div><button class="modal-close" onclick="closeModal()">×</button></div><label class="field-label">Board Title</label><input id="mb-title" class="field-input" placeholder="e.g. Romantic Garden…"/><label class="field-label">Palette Colours (hex, comma separated)</label><input id="mb-palette" class="field-input" placeholder="#f7e9d7, #c9b89a"/><label class="field-label">Notes / Mood</label><textarea id="mb-notes" class="field-input" rows="3" placeholder="Describe the vibe…"></textarea><div class="modal-row"><button class="btn-solid sm" onclick="saveMoodBoard('${context}')">Create</button><button class="btn-ghost" onclick="closeModal()">Cancel</button></div>`);}
function saveMoodBoard(context){const title=document.getElementById('mb-title').value.trim()||'New Board';const palette=document.getElementById('mb-palette').value.split(',').map(s=>s.trim()).filter(s=>s.startsWith('#'));const notes=document.getElementById('mb-notes').value.trim();const boards=userData(`moodboards_${context}`,[]);boards.push({id:uid(),title,palette,notes,tiles:[]});saveData(`moodboards_${context}`,boards);closeModal();if(context==='wedding'){setWeddingTab('moodboard');showSection('wedding');}else showSection(currentSection);}
function openEditBoard(context,boardIndex){const boards=userData(`moodboards_${context}`,[]);const board=boards[boardIndex];openModal(`<div class="modal-head"><div class="modal-title">Edit: ${board.title}</div><button class="modal-close" onclick="closeModal()">×</button></div><input type="file" id="mb-file" accept="image/*" multiple style="display:none"/><button class="btn-ghost mb14" onclick="pickMoodBoardImages(${boardIndex},'${context}')">+ Add Images</button><div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">${(board.tiles||[]).map((tile,ti)=>`<div style="position:relative;width:80px;height:80px;overflow:hidden;border:1px solid var(--bone)"><img src="${tile.img}" style="width:100%;height:100%;object-fit:cover"/><button onclick="removeTile(${boardIndex},'${context}',${ti})" style="position:absolute;top:2px;right:2px;background:rgba(168,32,32,.85);border:none;color:#fff;width:18px;height:18px;font-size:11px;cursor:pointer">×</button></div>`).join('')}</div><label class="field-label">Title</label><input id="mb-edit-title" class="field-input" value="${board.title||''}"/><label class="field-label">Palette</label><input id="mb-edit-palette" class="field-input" value="${(board.palette||[]).join(', ')}"/><label class="field-label">Notes</label><textarea id="mb-edit-notes" class="field-input" rows="3">${board.notes||''}</textarea><div class="modal-row"><button class="btn-solid sm" onclick="updateMoodBoard('${context}',${boardIndex})">Save</button><button class="btn-ghost" onclick="closeModal()">Cancel</button></div>`);}
function pickMoodBoardImages(boardIndex,context){const fi=document.getElementById('mb-file');fi.onchange=e=>{Array.from(e.target.files).forEach(file=>{const r=new FileReader();r.onload=ev=>{const boards=userData(`moodboards_${context}`,[]);boards[boardIndex].tiles=boards[boardIndex].tiles||[];boards[boardIndex].tiles.push({id:uid(),img:ev.target.result,note:'',size:'md'});saveData(`moodboards_${context}`,boards);openEditBoard(context,boardIndex);};r.readAsDataURL(file);});fi.value='';};fi.click();}
function removeTile(boardIndex,context,tileIndex){const boards=userData(`moodboards_${context}`,[]);boards[boardIndex].tiles.splice(tileIndex,1);saveData(`moodboards_${context}`,boards);openEditBoard(context,boardIndex);}
function updateMoodBoard(context,boardIndex){const boards=userData(`moodboards_${context}`,[]);const board=boards[boardIndex];board.title=document.getElementById('mb-edit-title').value.trim()||'Board';board.palette=document.getElementById('mb-edit-palette').value.split(',').map(s=>s.trim()).filter(s=>s.startsWith('#'));board.notes=document.getElementById('mb-edit-notes').value.trim();saveData(`moodboards_${context}`,boards);closeModal();if(context==='wedding'){setWeddingTab('moodboard');showSection('wedding');}else showSection(currentSection);}
function deleteMoodBoard(context,boardIndex){if(!confirm('Delete this mood board?'))return;const boards=userData(`moodboards_${context}`,[]);boards.splice(boardIndex,1);saveData(`moodboards_${context}`,boards);if(context==='wedding'){setWeddingTab('moodboard');showSection('wedding');}else showSection(currentSection);}

// ── DASHBOARD ──
function timeAgo(ts){
  if(!ts)return'';
  const diff=Date.now()-ts,mins=Math.floor(diff/60000);
  if(mins<2)return'Just now';
  if(mins<60)return`${mins}m ago`;
  const hrs=Math.floor(mins/60);
  if(hrs<24)return`${hrs}h ago`;
  const days=Math.floor(hrs/24);
  if(days<7)return`${days} day${days!==1?'s':''} ago`;
  return new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function renderDashboard(main){
  const home=userData('home',{rooms:[]});
  const w=userData('wedding',{inspo:[]});
  const h=userData('honeymoon',{rooms:[],inspo:[],budget:0});
  const d=userData('dayout',{plans:[]});
  const rec=userData('recipes',{items:[]});
  const music=userData('music',{playlists:[]});

  const homeSpent=home.rooms.reduce((s,r)=>s+(r.items||[]).reduce((a,i)=>a+(i.price||0),0)+(r.photos||[]).filter(p=>!p.archived).reduce((a,p)=>a+(p.price||0),0),0);
  const wPhotos=(w.inspo||[]).filter(p=>!p.archived).length;
  const songCount=music.playlists.reduce((s,p)=>s+(p.songs||[]).length,0);

  const cards=[
    {icon:'🏠',color:'var(--ink)',   name:'Our Home',   sub:home.rooms.length?`${home.rooms.length} room${home.rooms.length!==1?'s':''}${homeSpent?` · £${homeSpent.toLocaleString(undefined,{minimumFractionDigits:2})}`:''}`:null, empty:'No rooms yet',section:'home'},
    {icon:'💍',color:'var(--red)',   name:'Wedding',    sub:wPhotos?`${wPhotos} photo${wPhotos!==1?'s':''} saved`:null, empty:'Add inspiration',section:'wedding'},
    {icon:'✈️',color:'var(--teal)',  name:'Honeymoon',  sub:h.rooms.length?`${h.rooms.length} destination${h.rooms.length!==1?'s':''}`:null, empty:'Plan your trip',section:'honeymoon'},
    {icon:'🗺️',color:'var(--teal)',  name:'Days Out',   sub:d.plans.length?`${d.plans.length} plan${d.plans.length!==1?'s':''}`:null, empty:'Add a day out',section:'dayout'},
    {icon:'🍽️',color:'var(--green)', name:'Recipes',    sub:rec.items.length?`${rec.items.length} recipe${rec.items.length!==1?'s':''} saved`:null, empty:'Save your first',section:'recipes'},
    {icon:'🎵',color:'var(--gold)',  name:'Music',      sub:music.playlists.length?`${music.playlists.length} playlist${music.playlists.length!==1?'s':''}${songCount?` · ${songCount} song${songCount!==1?'s':''}`:''}`:'', empty:'Create a playlist',section:'music'},
  ];

  const recent=[];
  home.rooms.forEach(r=>(r.photos||[]).filter(p=>p.date&&!p.archived).forEach(p=>recent.push({label:p.note||'Home photo',tag:r.name,date:p.date,section:'home'})));
  (w.inspo||[]).filter(p=>p.date&&!p.archived).forEach(p=>recent.push({label:p.note||'Wedding photo',tag:'Wedding',date:p.date,section:'wedding'}));
  (h.inspo||[]).filter(p=>p.date&&!p.archived).forEach(p=>recent.push({label:p.note||'Honeymoon photo',tag:'Honeymoon',date:p.date,section:'honeymoon'}));
  rec.items.forEach(i=>recent.push({label:i.title||'Recipe',tag:'Recipes',date:i.date||0,section:'recipes'}));
  music.playlists.forEach(pl=>(pl.songs||[]).forEach(s=>recent.push({label:s.title,tag:pl.name,date:s.date||0,section:'music'})));
  recent.sort((a,b)=>b.date-a.date);
  const top=recent.slice(0,4);

  const recentHtml=top.length?top.map(r=>`<div class="dash-recent-row" onclick="showSection('${r.section}')" style="cursor:pointer"><div><div class="dash-recent-label">${r.label}</div><div class="dash-recent-meta">${timeAgo(r.date)}</div></div><div class="dash-recent-tag">${r.tag}</div></div>`).join(''):`<div style="font-size:13px;color:var(--muted);font-style:italic;padding:16px 0">Nothing added yet — tap a section to get started.</div>`;

  const firstName=currentUserName?currentUserName.split(' ')[0]:'';
  main.innerHTML=`<div style="max-width:600px">
    <div style="margin-bottom:26px">
      <div style="font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--warm);font-family:'Cormorant Garamond',serif;margin-bottom:6px">Welcome back${firstName?', '+firstName:''}</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:var(--ink);letter-spacing:-.01em;line-height:1">Your Journal</div>
    </div>
    <div class="dash-grid">${cards.map(c=>`<div class="dash-card" style="border-top-color:${c.color}" onclick="showSection('${c.section}')"><div class="dash-card-icon">${c.icon}</div><div class="dash-card-name">${c.name}</div>${c.sub?`<div class="dash-card-sub">${c.sub}</div>`:`<div class="dash-card-empty">${c.empty}</div>`}</div>`).join('')}</div>
    ${top.length?`<div style="font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-family:'Cormorant Garamond',serif;margin-bottom:2px">Recently Added</div>${recentHtml}`:''}
  </div>`;
}

// ── MUSIC ──
function renderMusic(main){
  const m=userData('music',{playlists:[]});
  if(!m.playlists.length){
    main.innerHTML=`<div class="section-rule"><div><div class="section-title">Music</div><div class="section-sub">Your favourite songs &amp; playlists.</div></div><div class="flex-center">${quickNotesBtn('music')}<button class="btn-solid sm" onclick="openAddPlaylist()">+ Playlist</button></div></div><div class="empty"><div class="empty-icon">🎵</div>No playlists yet. Create your first one!</div>`;
    return;
  }
  if(!activeMusicPlaylistId||!m.playlists.find(p=>p.id===activeMusicPlaylistId))activeMusicPlaylistId=m.playlists[0].id;
  const pl=m.playlists.find(p=>p.id===activeMusicPlaylistId);
  const tabs=m.playlists.map(p=>`<button class="room-tab${p.id===activeMusicPlaylistId?' active':''}" onclick="setActiveMusicPlaylist('${p.id}')">${p.name}</button>`).join('');
  const songs=pl.songs||[];
  const songsHtml=songs.length?songs.map((s,i)=>`<div class="song-row">
    <div class="song-num">${i+1}</div>
    <div class="song-body">
      <div class="song-title">${s.title}</div>
      ${s.artist?`<div class="song-artist">${s.artist}</div>`:''}
      ${s.note?`<div class="song-note">${s.note}</div>`:''}
    </div>
    ${s.link?`<a href="${s.link}" target="_blank" rel="noopener" class="song-link-btn">▶ Play</a>`:''}
    <button class="icon-btn" title="Delete" onclick="deleteSong('${pl.id}','${s.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>
  </div>`).join(''):`<div class="empty" style="padding:20px 0;font-size:13px">No songs yet — add your first!</div>`;
  main.innerHTML=`<div class="section-rule"><div><div class="section-title">Music</div><div class="section-sub">Your favourite songs &amp; playlists.</div></div><div class="flex-center">${quickNotesBtn('music')}<button class="btn-solid sm" onclick="openAddPlaylist()">+ Playlist</button></div></div>
    <div class="room-tabs-row">${tabs}</div>
    <div class="flex-between mb14" style="padding-top:16px">
      <div style="font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)">${pl.name} <span style="font-size:12px;font-weight:400;letter-spacing:.04em">${songs.length} song${songs.length!==1?'s':''}</span></div>
      <div class="flex-center">
        <button class="btn-ghost" onclick="openAddSong('${pl.id}')">+ Add Song</button>
        <button class="btn-ghost danger" onclick="deletePlaylist('${pl.id}')">Delete</button>
      </div>
    </div>
    ${pl.description?`<p style="font-size:13px;color:var(--muted);font-style:italic;margin-bottom:14px">${pl.description}</p>`:''}
    ${songsHtml}`;
}
function setActiveMusicPlaylist(id){activeMusicPlaylistId=id;showSection('music');}
function openAddPlaylist(){
  openModal(`<div class="modal-head"><div class="modal-title">New Playlist</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <label class="field-label">Playlist Name</label>
    <input id="pl-name" class="field-input" placeholder="e.g. Favourites, Wedding Morning…"/>
    <label class="field-label">Description (optional)</label>
    <input id="pl-desc" class="field-input" placeholder="A note about this playlist…"/>
    <div class="modal-row"><button class="btn-solid sm" onclick="savePlaylist()">Create</button><button class="btn-ghost" onclick="closeModal()">Cancel</button></div>`);
}
function savePlaylist(){
  const name=(document.getElementById('pl-name').value||'').trim();if(!name)return;
  const m=userData('music',{playlists:[]});const id=uid();
  m.playlists.push({id,name,description:(document.getElementById('pl-desc').value||'').trim(),songs:[]});
  saveData('music',m);activeMusicPlaylistId=id;closeModal();showSection('music');
}
function deletePlaylist(id){
  if(!confirm('Delete this playlist and all its songs?'))return;
  const m=userData('music',{playlists:[]});
  m.playlists=m.playlists.filter(p=>p.id!==id);
  activeMusicPlaylistId=m.playlists.length?m.playlists[0].id:null;
  saveData('music',m);showSection('music');
}
function openAddSong(playlistId){
  openModal(`<div class="modal-head"><div class="modal-title">Add Song</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <label class="field-label">Song Title</label>
    <input id="song-title" class="field-input" placeholder="e.g. Fly Me to the Moon…"/>
    <label class="field-label">Artist</label>
    <input id="song-artist" class="field-input" placeholder="e.g. Frank Sinatra…"/>
    <label class="field-label">Link (Spotify / YouTube / Apple Music)</label>
    <input id="song-link" class="field-input" type="url" placeholder="https://…"/>
    <label class="field-label">Note (optional)</label>
    <input id="song-note" class="field-input" placeholder="Why you love it…"/>
    <div class="modal-row"><button class="btn-solid sm" onclick="saveSong('${playlistId}')">Add to Playlist</button><button class="btn-ghost" onclick="closeModal()">Cancel</button></div>`);
}
function saveSong(playlistId){
  const title=(document.getElementById('song-title').value||'').trim();if(!title)return;
  const m=userData('music',{playlists:[]});const pl=m.playlists.find(p=>p.id===playlistId);if(!pl)return;
  pl.songs=pl.songs||[];
  pl.songs.push({id:uid(),title,artist:(document.getElementById('song-artist').value||'').trim(),link:(document.getElementById('song-link').value||'').trim(),note:(document.getElementById('song-note').value||'').trim(),date:Date.now()});
  saveData('music',m);closeModal();showSection('music');
}
function deleteSong(playlistId,songId){
  const m=userData('music',{playlists:[]});const pl=m.playlists.find(p=>p.id===playlistId);
  if(pl){pl.songs=(pl.songs||[]).filter(s=>s.id!==songId);saveData('music',m);}showSection('music');
}

// ── FEEDBACK ──
function openFeedback(){
  openModal(`<div class="modal-head"><div class="modal-title">Send Feedback</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <label class="field-label">Your Feedback</label>
    <textarea id="feedback-text" class="field-input" rows="5" placeholder="Suggestions, bugs, ideas…"></textarea>
    <div class="modal-row" style="margin-top:8px">
      ${currentUserEmail?`<button class="btn-solid sm" onclick="emailFeedback()">📧 Email to Myself</button>`:''}
      <button class="btn-ghost" onclick="copyFeedback()">📋 Copy to Clipboard</button>
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:12px;font-style:italic">${currentUserEmail?`Will open your email app addressed to ${currentUserEmail}.`:'Copies your feedback to the clipboard.'}</p>`);
}
function emailFeedback(){
  const text=document.getElementById('feedback-text').value.trim();if(!text)return;
  const subject=encodeURIComponent('MAISON App Feedback');
  const body=encodeURIComponent(`MAISON Feedback\n${'─'.repeat(30)}\n\n${text}\n\nSent from MAISON — ${new Date().toLocaleDateString('en-GB')}`);
  window.open(`mailto:${currentUserEmail}?subject=${subject}&body=${body}`);closeModal();
}
function copyFeedback(){
  const text=document.getElementById('feedback-text').value.trim();if(!text)return;
  const full=`MAISON Feedback\n${'─'.repeat(30)}\n\n${text}\n\nSent from MAISON — ${new Date().toLocaleDateString('en-GB')}`;
  navigator.clipboard.writeText(full).then(()=>{alert('Copied to clipboard!');closeModal();}).catch(()=>{const el=document.createElement('textarea');el.value=full;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);alert('Copied!');closeModal();});
}

function openSettings(){
  openModal(`<div class="modal-head"><div class="modal-title">Settings</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div style="margin-bottom:20px">
      <div class="field-label" style="margin-bottom:8px">Account</div>
      <div style="font-size:15px;margin-bottom:4px">${currentUserName}</div>
      ${currentUserEmail?`<div style="font-size:12px;color:var(--muted);margin-bottom:16px;font-style:italic">${currentUserEmail}</div>`:''}

    <hr class="divider"/>
    <div style="margin-bottom:20px">
      <div class="field-label" style="margin-bottom:8px">Feedback</div>

    <div>

function signOut(){currentUser=null;capturedDataURL=null;activeRoomId=null;document.getElementById('app').classList.remove('visible');document.getElementById('auth-screen').style.display='flex';google.accounts.id.disableAutoSelect();closeModal();}
function clearData(){if(!confirm('Permanently delete all your data?'))return;Object.keys(localStorage).filter(k=>k.startsWith(`maison_${currentUser}_`)).forEach(k=>localStorage.removeItem(k));closeModal();alert('Data cleared.');showSection('dashboard');}
